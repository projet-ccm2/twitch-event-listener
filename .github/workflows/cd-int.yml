name: Deploy to Integration
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: int-{sha})"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Run integration tests after deployment"
        required: false
        type: boolean
        default: true

jobs:
  deploy-int:
    name: Deploy to Integration
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      docker-image-name: twitch-event-listener-api-int
      docker-tag: ${{ github.event.inputs.image-tag || format('dev-{0}', github.sha) }}
      artifact-registry-repository: "twitch-event-listener-docker-int"
      environment: production
      cloud-run-service-name: twitch-event-listener-int
      cloud-run-min-instances: "1"
      cloud-run-max-instances: "1"
      required_env_vars: GCP_SA_KEY,GCP_PROJECT_ID,TWITCH_CLIENT_ID,USE_MOCK,DISPATCHER_URL,DB_SERVICE_URL,SYNC_INTERVAL_MS,ALLOWED_ORIGINS,TWITCH_APP_ACCESS_TOKEN,TWITCH_WEBHOOK_SECRET,PUBLIC_EVENTSUB_CALLBACK
    secrets:
      GCP_SA_KEY: ${{ secrets.INT_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.INT_GCP_PROJECT_ID }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      USE_MOCK: ${{ secrets.USE_MOCK }}
      DISPATCHER_URL: ${{ secrets.INT_DISPATCHER_URL }}
      DB_SERVICE_URL: ${{ secrets.INT_DB_SERVICE_URL }}
      SYNC_INTERVAL_MS: ${{ secrets.SYNC_INTERVAL_MS }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      TWITCH_APP_ACCESS_TOKEN: ${{ secrets.TWITCH_APP_ACCESS_TOKEN }}
      TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
      PUBLIC_EVENTSUB_CALLBACK: ${{ secrets.INT_PUBLIC_EVENTSUB_CALLBACK }}
